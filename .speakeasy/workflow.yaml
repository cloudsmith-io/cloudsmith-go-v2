workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    Cloudsmith API:
        inputs:
            - location: https://api.cloudsmith.io/v2/openapi
        overlays:
            - location: .speakeasy/overlays/cloudsmith-v2.yaml
            - location: .speakeasy/overlays/cloudsmith-retries.yaml
            - location: .speakeasy/overlays/cloudsmith-pagination.yaml
            - location: .speakeasy/overlays/cloudsmith-auth.yaml
        registry:
            location: registry.speakeasyapi.dev/cloudsmith/default/cloudsmith-api
targets:
    go:
        target: go
        source: Cloudsmith API
        output: .
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/cloudsmith/default/cloudsmith-api-go-code-samples
            labelOverride:
                fixedValue: Go (SDK)
            blocking: false
